version: "3.9"
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OSRM_BASE_URL=http://osrm:5000
      - AMAP_API_KEY=${AMAP_API_KEY:}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:}
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  # ===== OSRM: self-hosted routing engine (free, unlimited matrices) =====
  # Uncomment to enable zero-cost real road distance matrices.
  # Requires OSM data file at ./osm-data/<region>.osm.pbf
  #
  # To set up:
  #   1. Download OSM data: https://download.geofabrik.de/
  #   2. Place in ./osm-data/ (e.g., ./osm-data/shanghai.osm.pbf)
  #   3. Update OSM_FILE below
  #   4. docker-compose up osrm
  #
  # osrm:
  #   image: ghcr.io/project-osrm/osrm-backend:latest
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./osm-data:/data
  #   command: >
  #     sh -c "
  #       osrm-extract -p /opt/car.lua /data/${OSM_FILE:-china-latest.osm.pbf} &&
  #       osrm-partition /data/${OSM_FILE:-china-latest.osm.pbf} &&
  #       osrm-customize /data/${OSM_FILE:-china-latest.osm.pbf} &&
  #       osrm-routed --algorithm mld /data/${OSM_FILE:-china-latest.osm.pbf}
  #     "
  #   environment:
  #     - OSM_FILE=${OSM_FILE:-china-latest.osm.pbf}
  #   restart: unless-stopped

volumes:
  redis-data:
